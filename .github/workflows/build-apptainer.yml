name: Build Apptainer Image

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: git-runner-tmp   # your local runner

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show Apptainer version
        run: apptainer --version

      - name: Find def file
        run: find . -name "*.def"

      - name: Build container
        run: |
          mkdir -p output
          apptainer build output/container.sif ubuntu.def

      - name: Verify container
        run: |
          apptainer inspect output/container.sif

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apptainer-image
          path: output/container.sif